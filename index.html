### Equilibrium Concepts
#### others
  <section>
    <div style="width: 100%;"> 
      <ul>
        <li data-fragment-index="0" class="fragment">Exchange stability
          <ul>
            <li data-fragment-index="1" class="fragment">No pair of agents would prefer to exchange their coalitions over staying in their assigned coalition</li>
          </ul>
        </li>
        <li data-fragment-index="2" class="fragment">Envy-freeness
          <ul>
            <li data-fragment-index="3" class="fragment">No agent wants to take the place of another agent</li>
          </ul>
        </li>
        <li data-fragment-index="4" class="fragment">Pareto optimality
          <ul>
            <li data-fragment-index="5" class="fragment">No other partitioning of agents exists such that none of the agents are worse off and some of the agents are better off</li>
          </ul>
        </li>
      </ul>
    </div>

### Q1: Hardness Upperbound
<section class="graph-section">
  <div style="width: 100%;">
    <ul>
      <li data-fragment-index="1" class="fragment">Game $G = ($<span style="color:red">$R$</span>$,$<span style="color:blue">$B$</span>$,s, (\succsim_a)_{a \in }$<span style="color:red">$_R$</span>$_\cup$<span style="color:blue">$_B$</span>$)$</li>
      <li data-fragment-index="2" class="fragment">$N(\pi, \pi') = \{a \in $<span style="color:red">$R$</span>$\cup$<span style="color:blue">$B$</span>$ ~|~ \pi \succ_a \pi'\}$
        <ul>
          <li data-fragment-index="3" class="fragment">$N(\pi, \pi')$ can be computed in linear time</li>
        </ul>
      </li>
      <li data-fragment-index="4" class="fragment">
        $P(G, \pi, \pi') = \begin{cases}
          True, & |N(\pi, \pi')| \geq |N(\pi', \pi)| \\
          False, & \text{ Otherwise}
        \end{cases}$
      </li>
      <br>
      <li data-fragment-index="5" class="fragment">$G$ is a yes-instance $\iff \exists_{\pi}\forall_{\pi'}P(G,\pi,\pi')$</br>
      <span data-fragment-index="7" class="fragment">$\iff$</span><br>
      <span data-fragment-index="8" class="fragment">$G \in \mathcal{L}_{pop} \iff \exists_{\pi}\forall_{\pi'}P(G,\pi,\pi')$</span><span data-fragment-index="11" class="fragment">$\iff \mathcal{L}_{pop} \in \Sigma_2$</span><br>
      </li>
      <br>
      <li data-fragment-index="9" class="fragment">PH $= \bigcup\limits_{i=0}^{\infty}\Sigma_i$</li>
      <li data-fragment-index="10" class="fragment">$\Sigma_i = \exists_{y_1}\forall_{y_2}...Q_{y_i}P(x,y_1, y_1, \dots, y_i)$</li>
    </ul>
  </div>
</section>

### On the Ascending Layers$^\dagger$

<section>
  <p>
    The $xy$-plane of the auxiliary set agents $u'_i$ and $l'_i$ is free from other agents, except for the parts of other ascending layers that go straight up. That is, the parts of the chains from $u_j$ to $u'_j$ and from $l'_j$ to $l_j$. Due to the construction of the bottom layer, the distance between two of such parts that go straight up is at least $10-\epsilon$. Thus, when constructing the part of the ascending layer that is parallel to the $xy$-plane, that is the chain from $u'_i$ to $l'_i$, we have enough space to "go around" a straight up chain parts from $u_j$ to $u'_j$ or $l'_j$ to $l_j$. 
    </p>
    <p>
    Additionally, we can compute the distance between 2 lines in 3D space in constant time. The distance formula is $\frac{|(\vec a_2 - \vec a_1) \cdot (\vec b_1 \times \vec b_2)|}{|\vec b_1 \times \vec b_2|}$, where $\vec a_1, \vec a_2$ are position vectors on the two lines, and $\vec b_1, \vec b_2$ are their direction vectors.
    </p>
</section>

    document.addEventListener("DOMContentLoaded", function () {


      var sectionEventHandler = async function (event) {
        if (event.fragment.id === undefined) {

        }
        else if (event.fragment.id == 'result') {
        }
        else if (event.fragment.id == 'graph34-cy') {
          Reveal.nextFragment();
          await sleep(250);
          Reveal.nextFragment();
        }
        else if (event.fragment.id == 'strictpop1') {
          for (let i = 0; i < 5; i++) {
            Reveal.nextFragment();
            await sleep(250);
          }
        }
        else if (event.fragment.id == 'strictpop2') {
          for (let i = 0; i < 5; i++) {
            Reveal.nextFragment();
            await sleep(250);
          }
        }
        else if (event.fragment.id == 'x3c1') {
          for (let i = 0; i < 12; i++) {
            Reveal.nextFragment();
            await sleep(200);
          }
        }
        else if (event.fragment.id == 'graph10-cy_pcx3c') {
          document.getElementById("graph1-cy_pcx3c").style.display = "none";
          document.getElementById("graph10-cy_pcx3c").style.display = "block";
        }

        else if (event.fragment.classList.contains("unhide")) {
          await sleep(150);
          event.fragment.style.display = ''
        }

        else if (event.fragment.classList.contains("hide")) {
          // await sleep(200);
          event.fragment.style.display = 'none'
        }
      }

      Reveal.addEventListener('fragmentshown', sectionEventHandler);

      var sectionEventHandlerBack = async function (event) {
        if (event.fragment.id === undefined) {

        }
        else if (event.fragment.id == 'result') {
        }
        else if (event.fragment.id == 'graph10-cy_pcx3c') {
          document.getElementById("graph1-cy_pcx3c").style.display = "block";
          document.getElementById("graph10-cy_pcx3c").style.display = "none";
        }
        else if (event.fragment.classList.contains("unhide")) {
          event.fragment.style.display = 'none'
        }
        else if (event.fragment.classList.contains("hide")) {
          await sleep(150);
          event.fragment.style.display = ''
        }
      }

      Reveal.addEventListener('fragmenthidden', sectionEventHandlerBack);
    });
  </script>
